<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snake — Ananthakrishnanks347-maker</title>
  <link rel="stylesheet" href="snake.css" />
</head>
<body>
  <main class="wrap">
    <h1>Snake</h1>
    <p class="hint">Use arrow keys or WASD to move. Press Space to pause.</p>
    <canvas id="game" width="400" height="400" aria-label="Snake game"></canvas>
    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>High: <span id="high">0</span></div>
      <button id="restart">Restart</button>
    </div>
    <footer class="credits">Built with ❤️ — open source. Run <code>index.html</code> in your browser to play.</footer>
  </main>
  <script src="snake.js"></script>
</body>
</html>
